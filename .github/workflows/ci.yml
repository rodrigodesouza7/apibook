name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: livros_user
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: livros_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://livros_user:123456@localhost:5432/livros_db

      - name: Run tests
        run: pytest -v
        env:
          DATABASE_URL: postgresql://livros_user:123456@localhost:5432/livros_db
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
